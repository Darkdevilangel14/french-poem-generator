<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=h1, initial-scale=1.0" />

    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <link rel="stylesheet" href="src/style.css" />
    <title>AI French Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>AI French Poem Generator</h1>
      </header>
      <main>
        <form id="poem-generator-form">
          <input
            type="text"
            placeholder="Enter the topic of the french poem"
            autofocus
            required
            class="instructions"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="poem" id="poem"></div>
      </main>
      <footer>
        This AI project was coded by
        <a href="https://github.com/Darkdevilangel14" target="_blank">
          Kaylah Jacobs </a
        >and is
        <a
          href="https://github.com/Darkdevilangel14/french-poem-generator"
          target="_blank"
        >
          open-sourced on Github</a
        >
        and is hosted on
        <a
          href="https://french-poem-generator-43kf.onrender.com"
          target="_blank"
          >Render</a
        >.
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
